<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">미중 AI 모델 접근 통제 흐름도</title>
  <desc id="desc">미국 모델의 중국계 접근 제한과 중국 모델의 해외 접근 제한 논의를 비교한 자체 SVG 흐름도</desc>
  <rect width="1200" height="720" fill="#f7faf8"/>
  <text x="70" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#16201c">AI 모델은 이제 칩처럼 통제 대상이 되고 있다</text>
  <text x="70" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#5d6a64">2026년 7월 보도 기준: 접근, 비용, 안보 논리가 동시에 움직입니다.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="165" width="310" height="170" rx="8" fill="#ffffff" stroke="#dce6e1"/>
    <text x="96" y="210" font-size="23" font-weight="800" fill="#2457d6">미국 모델</text>
    <text x="96" y="250" font-size="17" fill="#16201c">OpenAI, Google, Anthropic</text>
    <text x="96" y="284" font-size="16" fill="#5d6a64">중국 본토 접근 제한,</text>
    <text x="96" y="312" font-size="16" fill="#5d6a64">해외 자회사와 우회 접근 논란</text>
    <rect x="445" y="165" width="310" height="170" rx="8" fill="#ffffff" stroke="#dce6e1"/>
    <text x="471" y="210" font-size="23" font-weight="800" fill="#18a875">중국 모델</text>
    <text x="471" y="250" font-size="17" fill="#16201c">DeepSeek, Moonshot, Z.ai, Qwen</text>
    <text x="471" y="284" font-size="16" fill="#5d6a64">낮은 비용과 오픈웨이트로</text>
    <text x="471" y="312" font-size="16" fill="#5d6a64">미국·유럽 기업 사용 확대</text>
    <rect x="820" y="165" width="310" height="170" rx="8" fill="#ffffff" stroke="#dce6e1"/>
    <text x="846" y="210" font-size="23" font-weight="800" fill="#d9951e">정책 반응</text>
    <text x="846" y="250" font-size="17" fill="#16201c">수출통제와 이용약관 강화</text>
    <text x="846" y="284" font-size="16" fill="#5d6a64">미국은 중국계 접근을 좁히고,</text>
    <text x="846" y="312" font-size="16" fill="#5d6a64">중국도 해외 접근 제한을 검토</text>
    <path d="M388 250 H432" stroke="#5d6a64" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M763 250 H807" stroke="#5d6a64" stroke-width="4" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#5d6a64"/>
      </marker>
    </defs>
    <rect x="70" y="405" width="1060" height="205" rx="8" fill="#ffffff" stroke="#dce6e1"/>
    <text x="96" y="452" font-size="23" font-weight="800" fill="#16201c">블로그 판단</text>
    <text x="96" y="494" font-size="17" fill="#16201c">1. 단순한 신제품 뉴스가 아니라 모델 접근권, 가격, 안보 정책이 만나는 구조 변화입니다.</text>
    <text x="96" y="530" font-size="17" fill="#16201c">2. Reuters 인용 보도, WSJ, FT, AP의 1260H 보도로 일반 주요 매체 확산이 확인됩니다.</text>
    <text x="96" y="566" font-size="17" fill="#16201c">3. 기업별 성능 수치와 사용량 수치는 출처 간 불일치 가능성이 있어 본문에서 단정하지 않았습니다.</text>
  </g>
  <text x="70" y="670" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#5d6a64">데이터: Reuters 인용 보도, WSJ, FT, AP, 각 사 정책 보도를 바탕으로 직접 재구성. 외부 사진 또는 유료 그래픽 미사용.</text>
</svg>
