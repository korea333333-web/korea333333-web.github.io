<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GLM-5.2 long-horizon benchmark comparison</title>
  <desc id="desc">Company-published results for FrontierSWE, PostTrainBench, and SWE-Marathon, comparing GLM-5.2 with GPT-5.5 and Claude Opus 4.8.</desc>
