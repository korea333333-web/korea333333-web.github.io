<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" role="img" aria-labelledby="title desc" data-visual-check="visual-safe-v2">
  <title id="title">AI development loop infographic</title>
  <desc id="desc">An infographic-card style loop showing AI assisting code, experiments, evaluation, and model improvement, with a human review gate. The layout separates title, cards, and loop to avoid visual overlap.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef6f2"/>
      <stop offset="1" stop-color="#fff7eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1e342c" flood-opacity="0.13"/>
    </filter>
    <style>
      .t{font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif}
      .title{font-size:42px;font-weight:850;fill:#16201c}
      .sub{font-size:21px;fill:#5d6a64}
      .card{fill:#fff;stroke:#dce6e1;stroke-width:1.5}
      .label{font-size:24px;font-weight:850;fill:#16201c}
      .small{font-size:17px;fill:#5d6a64}
      .chip{font-size:16px;font-weight:800;fill:#2457d6}
      .loop{fill:none;stroke:#2457d6;stroke-width:7;stroke-dasharray:14 14;stroke-linecap:round;opacity:0.95}
    </style>
  </defs>

  <rect width="1080" height="760" rx="36" fill="url(#bg)"/>
  <g class="t">
    <text x="64" y="78" class="chip">AI DEVELOPMENT LOOP</text>
    <text x="64" y="132" class="title">AI development loop</text>
    <text x="64" y="170" class="sub">AI가 코드, 실험, 평가, 개선 과정에 들어오면 개발 루프가 빨라집니다</text>

    <path class="loop" d="M324 424 C324 286 418 224 540 224 C662 224 756 286 756 424 C756 562 662 624 540 624 C418 624 324 562 324 424Z"/>

    <path d="M744 536 L764 548 L743 559" fill="none" stroke="#2457d6" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

    <g filter="url(#shadow)">
      <rect x="425" y="224" width="230" height="132" rx="24" class="card"/>
      <text x="540" y="280" text-anchor="middle" class="label">Experiment</text>
      <text x="540" y="316" text-anchor="middle" class="small">실험 설계와 반복</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="82" y="360" width="230" height="132" rx="24" class="card"/>
      <text x="197" y="416" text-anchor="middle" class="label">Code assist</text>
      <text x="197" y="452" text-anchor="middle" class="small">코드 작성과 수정</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="768" y="360" width="230" height="132" rx="24" class="card"/>
      <text x="883" y="416" text-anchor="middle" class="label">Evaluation</text>
      <text x="883" y="452" text-anchor="middle" class="small">결과 분석과 검증</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="425" y="552" width="230" height="132" rx="24" class="card"/>
      <text x="540" y="608" text-anchor="middle" class="label">Model update</text>
      <text x="540" y="644" text-anchor="middle" class="small">다음 모델 개선</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="398" y="360" width="284" height="128" rx="28" fill="#16201c"/>
      <text x="540" y="415" text-anchor="middle" font-size="26" font-weight="900" fill="#ffffff">Human review gate</text>
      <text x="540" y="452" text-anchor="middle" font-size="18" fill="#dce6e1">속도가 빨라질수록 검증 지점이 필요</text>
    </g>

    <rect x="78" y="704" width="810" height="38" rx="16" fill="#ffffff" stroke="#dce6e1"/>
    <text x="106" y="729" font-size="16" fill="#5d6a64">Source: Anthropic Institute, When AI builds itself. Graphic recreated for explanation, not copied from the source.</text>
  </g>
</svg>
