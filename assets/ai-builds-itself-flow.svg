<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680" role="img" aria-labelledby="title desc">
  <title id="title">AI development loop infographic</title>
  <desc id="desc">An infographic-card style loop showing AI assisting code, experiments, evaluation, and model improvement, with a human review gate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef6f2"/>
      <stop offset="1" stop-color="#fff7eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1e342c" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2457d6"/>
    </marker>
    <style>
      .t{font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif}
      .title{font-size:44px;font-weight:850;fill:#16201c}
      .sub{font-size:22px;fill:#5d6a64}
      .card{fill:#fff;stroke:#dce6e1;stroke-width:1.5}
      .label{font-size:24px;font-weight:850;fill:#16201c}
      .small{font-size:17px;fill:#5d6a64}
      .chip{font-size:16px;font-weight:800;fill:#2457d6}
    </style>
  </defs>

  <rect width="1080" height="680" rx="36" fill="url(#bg)"/>
  <g class="t">
    <text x="64" y="82" class="chip">AI DEVELOPMENT LOOP</text>
    <text x="64" y="138" class="title">AI development loop</text>
    <text x="64" y="176" class="sub">AI가 코드, 실험, 평가, 개선 과정에 들어오면 개발 루프가 빨라집니다</text>

    <path d="M324 324 C324 208 414 160 540 160 C666 160 756 208 756 324 C756 440 666 488 540 488 C414 488 324 440 324 324Z"
          fill="none" stroke="#2457d6" stroke-width="8" stroke-dasharray="16 14" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="82" y="250" width="230" height="146" rx="24" class="card"/>
      <text x="197" y="306" text-anchor="middle" class="label">Code assist</text>
      <text x="197" y="342" text-anchor="middle" class="small">코드 작성과 수정</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="425" y="86" width="230" height="146" rx="24" class="card"/>
      <text x="540" y="142" text-anchor="middle" class="label">Experiment</text>
      <text x="540" y="178" text-anchor="middle" class="small">실험 설계와 반복</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="768" y="250" width="230" height="146" rx="24" class="card"/>
      <text x="883" y="306" text-anchor="middle" class="label">Evaluation</text>
      <text x="883" y="342" text-anchor="middle" class="small">결과 분석과 검증</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="425" y="416" width="230" height="146" rx="24" class="card"/>
      <text x="540" y="472" text-anchor="middle" class="label">Model update</text>
      <text x="540" y="508" text-anchor="middle" class="small">다음 모델 개선</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="398" y="260" width="284" height="128" rx="28" fill="#16201c"/>
      <text x="540" y="315" text-anchor="middle" font-size="26" font-weight="900" fill="#ffffff">Human review gate</text>
      <text x="540" y="352" text-anchor="middle" font-size="18" fill="#dce6e1">속도가 빨라질수록 검증 지점이 필요</text>
    </g>

    <rect x="78" y="592" width="764" height="54" rx="16" fill="#ffffff" stroke="#dce6e1"/>
    <text x="106" y="626" font-size="18" fill="#5d6a64">Source: Anthropic Institute, When AI builds itself. Graphic recreated for explanation, not copied from the source.</text>
  </g>
</svg>
