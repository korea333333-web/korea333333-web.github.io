<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">중국판 Apple Intelligence 기술 스택</title><desc id="desc">Apple 기기와 자체 처리, Alibaba Qwen, Baidu 기능, 중국 규제와 데이터 조건이 결합되는 구조</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f5f5f2"/><stop offset="1" stop-color="#dde7e3"/></linearGradient></defs><rect width="960" height="540" rx="28" fill="url(#bg)"/><g font-family="Pretendard, Noto Sans KR, sans-serif"><text x="52" y="62" font-size="30" font-weight="800" fill="#17231f">하나의 이름, 지역에 따라 다른 AI 스택</text><text x="52" y="95" font-size="16" fill="#5b6c65">중국판 Apple Intelligence에 보도된 구성요소</text><rect x="60" y="155" width="240" height="270" rx="30" fill="#151817"/><text x="180" y="205" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">Apple Devices</text><text x="180" y="240" text-anchor="middle" fill="#b9c2be" font-size="15">iPhone · iPad · Mac</text><rect x="95" y="280" width="170" height="55" rx="15" fill="#303633"/><text x="180" y="314" text-anchor="middle" fill="#e9f0ed" font-size="15">온디바이스 처리</text><rect x="95" y="350" width="170" height="45" rx="14" fill="#303633"/><text x="180" y="379" text-anchor="middle" fill="#e9f0ed" font-size="14">Apple 경험·권한</text><rect x="380" y="145" width="220" height="130" rx="24" fill="#ff7a32"/><text x="490" y="196" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">Alibaba Qwen</text><text x="490" y="230" text-anchor="middle" fill="#fff3eb" font-size="15">텍스트·이미지 AI 통합</text><rect x="380" y="310" width="220" height="115" rx="24" fill="#3376d3"/><text x="490" y="357" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">Baidu</text><text x="490" y="390" text-anchor="middle" fill="#e8f2ff" font-size="15">일부 검색·AI 기능 보도</text><rect x="680" y="155" width="220" height="270" rx="28" fill="#e7d4ac"/><text x="790" y="205" text-anchor="middle" fill="#493b22" font-size="22" font-weight="800">중국 운영 조건</text><text x="790" y="252" text-anchor="middle" fill="#675638" font-size="15">생성형 AI 등록</text><text x="790" y="287" text-anchor="middle" fill="#675638" font-size="15">현지 데이터 처리</text><text x="790" y="322" text-anchor="middle" fill="#675638" font-size="15">콘텐츠 안전 기준</text><text x="790" y="357" text-anchor="middle" fill="#675638" font-size="15">파트너 책임</text><g stroke="#6c857b" stroke-width="4" fill="none"><path d="M300 250H380"/><path d="M300 350H380"/><path d="M600 210H680"/><path d="M600 365H680"/></g><text x="480" y="490" text-anchor="middle" fill="#4b5f57" font-size="15">등록 완료와 실제 기능 출시·지원기기 발표는 별개의 단계</text></g></svg>
