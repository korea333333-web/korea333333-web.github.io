<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc"><title id="title">DeepSeek IPO 준비 로드맵</title><desc id="desc">보도된 준비와 아직 확인되지 않은 신청, 심사, 상장 단계를 시간 순으로 보여준다</desc><rect width="960" height="520" rx="28" fill="#f7f3ea"/><g font-family="Pretendard, Noto Sans KR, sans-serif"><text x="52" y="62" font-size="30" font-weight="800" fill="#252119">DeepSeek IPO, 지금 어디까지 왔나</text><text x="52" y="95" font-size="16" fill="#6c6457">보도된 준비 단계와 앞으로 공식 확인이 필요한 단계</text><line x1="125" y1="280" x2="835" y2="280" stroke="#c9bda8" stroke-width="8" stroke-linecap="round"/><g text-anchor="middle"><circle cx="150" cy="280" r="30" fill="#244d44"/><text x="150" y="288" fill="#fff" font-size="20" font-weight="800">1</text><text x="150" y="350" fill="#2d2923" font-size="18" font-weight="700">준비 착수</text><text x="150" y="380" fill="#6b6255" font-size="14">자문·재무정비</text><text x="150" y="405" fill="#2f745f" font-size="13" font-weight="700">보도됨</text><circle cx="370" cy="280" r="30" fill="#244d44"/><text x="370" y="288" fill="#fff" font-size="20" font-weight="800">2</text><text x="370" y="350" fill="#2d2923" font-size="18" font-weight="700">상장 전 조달</text><text x="370" y="380" fill="#6b6255" font-size="14">조건 협상 가능성</text><text x="370" y="405" fill="#2f745f" font-size="13" font-weight="700">보도됨</text><circle cx="590" cy="280" r="30" fill="#d3a746"/><text x="590" y="288" fill="#fff" font-size="20" font-weight="800">3</text><text x="590" y="350" fill="#2d2923" font-size="18" font-weight="700">신청서 제출</text><text x="590" y="380" fill="#6b6255" font-size="14">2026년 목표 보도</text><text x="590" y="405" fill="#a36d10" font-size="13" font-weight="700">공식 확인 전</text><circle cx="810" cy="280" r="30" fill="#d3a746"/><text x="810" y="288" fill="#fff" font-size="20" font-weight="800">4</text><text x="810" y="350" fill="#2d2923" font-size="18" font-weight="700">시장 데뷔</text><text x="810" y="380" fill="#6b6255" font-size="14">2027년 가능성</text><text x="810" y="405" fill="#a36d10" font-size="13" font-weight="700">일정 변동 가능</text></g><rect x="255" y="130" width="450" height="60" rx="18" fill="#fff" stroke="#ded4c4"/><text x="480" y="158" text-anchor="middle" fill="#40392e" font-size="17" font-weight="700">가장 중요한 다음 자료</text><text x="480" y="181" text-anchor="middle" fill="#746b5c" font-size="14">회사 공식 입장 · 거래소 신청서 · 감사 재무제표</text></g></svg>
