<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc"><title id="title">플래그십 AI 모델 출시 파이프라인</title><desc id="desc">내부 성능, 코딩 실전, 파트너 테스트, 안전 및 정책, 비용과 용량을 거쳐 공개 출시되는 흐름</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#11183b"/><stop offset="1" stop-color="#3c225b"/></linearGradient></defs><rect width="960" height="520" rx="28" fill="url(#bg)"/><g font-family="Pretendard, Noto Sans KR, sans-serif"><text x="52" y="62" fill="#fff" font-size="30" font-weight="800">모델 학습이 끝나도 바로 출시되지 않는다</text><text x="52" y="95" fill="#c7bde3" font-size="16">Gemini 3.5 Pro 보도가 보여준 다섯 개의 출시 관문</text><g fill="#fff" opacity=".96"><rect x="50" y="175" width="155" height="180" rx="20"/><rect x="225" y="175" width="155" height="180" rx="20"/><rect x="400" y="175" width="155" height="180" rx="20"/><rect x="575" y="175" width="155" height="180" rx="20"/><rect x="750" y="175" width="160" height="180" rx="20"/></g><g text-anchor="middle" fill="#2a2241"><text x="127" y="225" font-size="25" font-weight="800">1</text><text x="127" y="263" font-size="17" font-weight="700">내부 성능</text><text x="127" y="294" font-size="14">목표·회귀 평가</text><text x="302" y="225" font-size="25" font-weight="800">2</text><text x="302" y="263" font-size="17" font-weight="700">코딩 실전</text><text x="302" y="294" font-size="14">저장소·도구·테스트</text><text x="477" y="225" font-size="25" font-weight="800">3</text><text x="477" y="263" font-size="17" font-weight="700">파트너 시험</text><text x="477" y="294" font-size="14">기업 환경 검증</text><text x="652" y="225" font-size="25" font-weight="800">4</text><text x="652" y="263" font-size="17" font-weight="700">안전·정책</text><text x="652" y="294" font-size="14">위험·정부 협의</text><text x="830" y="225" font-size="25" font-weight="800">5</text><text x="830" y="263" font-size="17" font-weight="700">비용·용량</text><text x="830" y="294" font-size="14">속도·서버 준비</text></g><path d="M130 395H830" stroke="#9c7cf4" stroke-width="6" stroke-linecap="round"/><circle cx="830" cy="395" r="16" fill="#70e0be"/><text x="480" y="454" text-anchor="middle" fill="#eee9ff" font-size="20" font-weight="700">모든 관문이 맞아야 공개 출시</text></g></svg>
