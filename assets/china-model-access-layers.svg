<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">중국 AI 모델 접근 통제의 논의 단계</title>
  <desc id="desc">기본 오픈 도구, 고급 모델, 프런티어 모델에 신고, 보안심사, 공개 또는 해외 접근 제한을 적용하는 제안 구조</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff4e9"/><stop offset="1" stop-color="#eff4f7"/></linearGradient><filter id="s"><feDropShadow dy="7" stdDeviation="10" flood-opacity=".12"/></filter></defs>
  <rect width="1200" height="650" rx="30" fill="url(#bg)"/>
  <text x="65" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#3b2c27">아직 확정 규정이 아닌 ‘단계형 통제’ 제안</text>
  <text x="65" y="118" font-family="Arial, sans-serif" font-size="18" fill="#74645e">Reuters가 보도한 회의 논의를 API와 오픈웨이트 관점에서 재구성</text>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <rect x="80" y="200" width="300" height="250" rx="26" fill="#fff"/><circle cx="230" cy="270" r="48" fill="#4f8b66"/><text x="230" y="279" text-anchor="middle" font-size="27" font-weight="700" fill="#fff">1</text><text x="230" y="350" text-anchor="middle" font-size="23" font-weight="700" fill="#355444">기본 오픈 도구</text><text x="230" y="395" text-anchor="middle" font-size="18" fill="#68716c">간단한 신고 가능성</text>
    <rect x="450" y="200" width="300" height="250" rx="26" fill="#fff"/><circle cx="600" cy="270" r="48" fill="#d09832"/><text x="600" y="279" text-anchor="middle" font-size="27" font-weight="700" fill="#fff">2</text><text x="600" y="350" text-anchor="middle" font-size="23" font-weight="700" fill="#75541e">고급 모델</text><text x="600" y="395" text-anchor="middle" font-size="18" fill="#68716c">보안심사 가능성</text>
    <rect x="820" y="200" width="300" height="250" rx="26" fill="#fff"/><circle cx="970" cy="270" r="48" fill="#b95445"/><text x="970" y="279" text-anchor="middle" font-size="27" font-weight="700" fill="#fff">3</text><text x="970" y="350" text-anchor="middle" font-size="23" font-weight="700" fill="#763b32">프런티어 모델</text><text x="970" y="390" text-anchor="middle" font-size="18" fill="#68716c">공개 금지 또는</text><text x="970" y="420" text-anchor="middle" font-size="18" fill="#68716c">국내 사용 제한 가능성</text>
  </g>
  <g stroke="#8a837d" stroke-width="5" fill="none"><path d="M380 325 H450"/><path d="M750 325 H820"/></g><g fill="#8a837d"><path d="M440 312 l20 13 -20 13z"/><path d="M810 312 l20 13 -20 13z"/></g>
  <rect x="170" y="515" width="860" height="70" rx="20" fill="#3b2c27"/><text x="600" y="558" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#fff">중요: 대상 모델·시점·집행 방식은 공개되지 않았으며 현재는 검토 단계</text>
</svg>
