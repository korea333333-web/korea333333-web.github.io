<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Claude Fable 5 safeguard routing infographic</title>
  <desc id="desc">An infographic-card style flow showing user requests going through a classifier, with normal requests answered by Fable 5 and sensitive requests taking a fallback route to Opus 4.8.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#f3faf6"/>
      <stop offset="1" stop-color="#fff7eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#1e342c" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2457d6"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d9951e"/>
    </marker>
    <style>
      .t{font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif}
      .title{font-size:44px;font-weight:850;fill:#16201c}
      .sub{font-size:22px;fill:#5d6a64}
      .card{fill:#fff;stroke:#dce6e1;stroke-width:1.5}
      .label{font-size:23px;font-weight:850;fill:#16201c}
      .small{font-size:17px;fill:#5d6a64}
      .big{font-size:58px;font-weight:900}
      .chip{font-size:16px;font-weight:800;fill:#2457d6}
    </style>
  </defs>

  <rect width="1080" height="720" rx="36" fill="url(#bg)"/>
  <g class="t">
    <text x="64" y="82" class="chip">SAFETY ROUTING</text>
    <text x="64" y="138" class="title">Fable 5는 요청을 먼저 분류합니다</text>
    <text x="64" y="176" class="sub">대부분은 Fable 5가 응답하고, 민감한 일부 요청은 Opus 4.8로 fallback</text>

    <g filter="url(#shadow)">
      <rect x="70" y="278" width="230" height="150" rx="24" class="card"/>
      <text x="185" y="334" text-anchor="middle" class="label">User request</text>
      <text x="185" y="372" text-anchor="middle" class="small">질문 또는 작업 요청</text>
    </g>

    <path d="M314 353 L426 353" stroke="#2457d6" stroke-width="7" marker-end="url(#arrowBlue)"/>

    <g filter="url(#shadow)">
      <rect x="448" y="250" width="230" height="206" rx="28" fill="#16201c"/>
      <text x="563" y="322" text-anchor="middle" font-size="28" font-weight="900" fill="#ffffff">Classifier</text>
      <text x="563" y="360" text-anchor="middle" font-size="18" fill="#dce6e1">cyber / bio-chem</text>
      <text x="563" y="389" text-anchor="middle" font-size="18" fill="#dce6e1">distillation 등 확인</text>
    </g>

    <path d="M694 318 C760 278 794 258 842 258" stroke="#18a875" stroke-width="7" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M694 400 C760 444 796 470 842 470" stroke="#d9951e" stroke-width="7" fill="none" marker-end="url(#arrowAmber)"/>

    <g filter="url(#shadow)">
      <rect x="854" y="190" width="174" height="140" rx="24" fill="#ffffff" stroke="#bfe8d8" stroke-width="2"/>
      <text x="941" y="242" text-anchor="middle" class="big" fill="#18a875">95%+</text>
      <text x="941" y="280" text-anchor="middle" class="label">Fable 5</text>
      <text x="941" y="307" text-anchor="middle" class="small">normal route</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="854" y="420" width="174" height="142" rx="24" fill="#ffffff" stroke="#efd2a3" stroke-width="2"/>
      <text x="941" y="472" text-anchor="middle" class="big" fill="#d9951e">&lt;5%</text>
      <text x="941" y="510" text-anchor="middle" class="label">Opus 4.8</text>
      <text x="941" y="537" text-anchor="middle" class="small">fallback route</text>
    </g>

    <rect x="78" y="570" width="752" height="72" rx="18" fill="#ffffff" stroke="#dce6e1"/>
    <text x="110" y="614" font-size="22" font-weight="850" fill="#16201c">민감 영역:</text>
    <text x="220" y="614" font-size="20" fill="#5d6a64">사이버보안, 생물·화학, 모델 증류 관련 일부 요청</text>
    <text x="64" y="674" class="small">Source: Anthropic, Claude Fable 5 and Claude Mythos 5, Jun 9 2026</text>
  </g>
</svg>
