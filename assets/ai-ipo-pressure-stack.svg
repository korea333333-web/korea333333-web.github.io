<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI IPO pressure stack</title>
  <desc id="desc">A stacked visual showing why OpenAI and Anthropic could face public market pressure: high valuation, high compute cost, competition, infrastructure dependence and profit proof.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf8"/>
      <stop offset="0.5" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f7f1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="78" fill="#111827" font-family="Arial, sans-serif" font-size="38" font-weight="700">The AI IPO test is not just growth</text>
  <text x="70" y="119" fill="#5b6472" font-family="Arial, sans-serif" font-size="19">Public markets will ask whether frontier model revenue can outrun compute cost.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="178" width="310" height="395" rx="22" fill="#ffffff" stroke="#d8dee8"/>
    <text x="128" y="232" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Private-market story</text>
    <text x="128" y="282" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Explosive revenue growth</text>
    <text x="128" y="326" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Strategic investors</text>
    <text x="128" y="370" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Model leadership</text>
    <text x="128" y="414" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Enterprise demand</text>
    <rect x="128" y="480" width="214" height="54" rx="27" fill="#16a34a"/>
    <text x="166" y="515" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Valuation up</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="445" y="148" width="310" height="455" rx="22" fill="#111827"/>
    <text x="485" y="203" fill="#ffffff" font-family="Arial, sans-serif" font-size="27" font-weight="700">Public-market test</text>
    <g fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18">
      <text x="485" y="258">Can margins improve?</text>
      <text x="485" y="310">Can compute spending slow?</text>
      <text x="485" y="362">Can models avoid commoditization?</text>
      <text x="485" y="414">Can cloud partners stay friendly?</text>
      <text x="485" y="466">Can regulation stay predictable?</text>
    </g>
    <rect x="485" y="525" width="225" height="54" rx="27" fill="#f97316"/>
    <text x="520" y="560" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Profit proof</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="178" width="310" height="395" rx="22" fill="#ffffff" stroke="#d8dee8"/>
    <text x="838" y="232" fill="#111827" font-family="Arial, sans-serif" font-size="26" font-weight="700">Pressure points</text>
    <text x="838" y="282" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Infrastructure takes the money</text>
    <text x="838" y="326" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Big Tech can bundle models</text>
    <text x="838" y="370" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Open models lower prices</text>
    <text x="838" y="414" fill="#4b5563" font-family="Arial, sans-serif" font-size="18">Safety disputes add risk</text>
    <rect x="838" y="480" width="214" height="54" rx="27" fill="#dc2626"/>
    <text x="876" y="515" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Discount risk</text>
  </g>

  <path d="M400 375 C422 375 423 375 445 375" stroke="#64748b" stroke-width="4"/>
  <path d="M755 375 C777 375 778 375 800 375" stroke="#64748b" stroke-width="4"/>
  <text x="372" y="650" fill="#475569" font-family="Arial, sans-serif" font-size="18">Blog angle: AI demand is real, but public markets price cash flow, not awe.</text>
</svg>
