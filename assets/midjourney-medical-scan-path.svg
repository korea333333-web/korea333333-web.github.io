<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Midjourney Medical scan concept and clinical review path</title>
  <desc id="desc">A conceptual path from a spa-like ultrasound scan through AI reconstruction to clinician review and possible follow-up testing.</desc>
  <defs>
    <linearGradient id="water" x1="0" x2="1">
      <stop offset="0" stop-color="#d9efe8"/>
      <stop offset="1" stop-color="#b7dfe3"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#2b6970"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="38" fill="#f7f1e7"/>
  <text x="62" y="75" fill="#173c42" font-family="Georgia, serif" font-size="36" font-weight="700">FROM 60-SECOND DEMO TO MEDICAL DECISION</text>
  <text x="62" y="110" fill="#60757a" font-family="Arial, sans-serif" font-size="17">The product concept is visible; clinical performance is still an open question.</text>

  <g transform="translate(62 164)">
    <rect width="234" height="250" rx="30" fill="url(#water)" stroke="#91c4c8"/>
    <circle cx="117" cy="79" r="34" fill="#f2c7a5"/>
    <path d="M68 174c8-48 32-71 49-71s41 23 49 71" fill="#fff" stroke="#2b6970" stroke-width="5"/>
    <path d="M24 192c42-14 77 14 116 0s64 9 70 20" fill="none" stroke="#2b6970" stroke-width="7" opacity=".65"/>
    <text x="24" y="222" fill="#173c42" font-family="Arial, sans-serif" font-size="16" font-weight="700">1 · ULTRASOUND ARRAY</text>
    <text x="24" y="246" fill="#426168" font-family="Arial, sans-serif" font-size="13">spa-like scan concept</text>
  </g>

  <path d="M310 289h62" stroke="#2b6970" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(386 164)">
    <rect width="234" height="250" rx="30" fill="#173c42"/>
    <g transform="translate(49 34)" fill="none" stroke="#72c3b5" stroke-width="4">
      <ellipse cx="68" cy="62" rx="55" ry="62"/>
      <ellipse cx="68" cy="62" rx="35" ry="62" transform="rotate(45 68 62)"/>
      <ellipse cx="68" cy="62" rx="35" ry="62" transform="rotate(-45 68 62)"/>
      <circle cx="68" cy="62" r="14" fill="#e8b34f" stroke="none"/>
    </g>
    <text x="24" y="196" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="700">2 · AI RECONSTRUCTION</text>
    <text x="24" y="222" fill="#b8d2d3" font-family="Arial, sans-serif" font-size="13">signals become images</text>
    <text x="24" y="243" fill="#b8d2d3" font-family="Arial, sans-serif" font-size="13">and candidate findings</text>
  </g>

  <path d="M634 289h62" stroke="#2b6970" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(710 164)">
    <rect width="196" height="250" rx="30" fill="#fffdf8" stroke="#d6cbb9"/>
    <circle cx="98" cy="79" r="39" fill="#e8b34f"/>
    <path d="M77 79h42M98 58v42" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="22" y="178" fill="#173c42" font-family="Arial, sans-serif" font-size="16" font-weight="700">3 · CLINICIAN</text>
    <text x="22" y="202" fill="#173c42" font-family="Arial, sans-serif" font-size="16" font-weight="700">REVIEW</text>
    <text x="22" y="229" fill="#60757a" font-family="Arial, sans-serif" font-size="13">context matters</text>
  </g>

  <path d="M920 289h62" stroke="#2b6970" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(996 164)">
    <rect width="142" height="250" rx="30" fill="#d75d45"/>
    <text x="20" y="54" fill="#fff" font-family="Arial, sans-serif" font-size="15" font-weight="700">4 · NEXT?</text>
    <path d="M26 89h90M26 127h72M26 165h82" stroke="#ffd8cb" stroke-width="12" stroke-linecap="round"/>
    <text x="20" y="211" fill="#fff" font-family="Arial, sans-serif" font-size="13">follow-up scan</text>
    <text x="20" y="232" fill="#fff" font-family="Arial, sans-serif" font-size="13">or no action</text>
  </g>

  <g transform="translate(62 470)">
    <rect width="1076" height="132" rx="26" fill="#fffdf8" stroke="#d6cbb9"/>
    <text x="26" y="42" fill="#d75d45" font-family="Arial, sans-serif" font-size="15" font-weight="700">THE UNRESOLVED CLINICAL QUESTIONS</text>
    <text x="26" y="78" fill="#173c42" font-family="Georgia, serif" font-size="24">Sensitivity · false positives · who benefits · regulatory clearance · follow-up burden</text>
    <text x="26" y="109" fill="#60757a" font-family="Arial, sans-serif" font-size="14">A compelling demonstration is not the same as an independently validated screening program.</text>
  </g>

  <text x="62" y="644" fill="#60757a" font-family="Arial, sans-serif" font-size="13">Conceptual reconstruction from public demonstrations and reporting; not a confirmed clinical workflow.</text>
</svg>
