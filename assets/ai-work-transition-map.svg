<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI가 노동시장에 영향을 주는 네 단계</title>
  <desc id="desc">개별 업무의 보조와 자동화가 직무 재설계, 조직의 채용과 교육, 노동시장의 임금과 고용 변화로 이어지는 경로</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff8eb"/><stop offset="1" stop-color="#eef5ff"/></linearGradient><filter id="s"><feDropShadow dy="8" stdDeviation="10" flood-opacity=".12"/></filter></defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="65" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202c43">AI는 ‘직업’을 한 번에 없애기보다 업무 구조부터 바꾼다</text>
  <text x="65" y="118" font-family="Arial, sans-serif" font-size="18" fill="#667086">공개서한의 경제 전환 논점을 업무에서 노동시장까지 연결</text>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <rect x="65" y="210" width="235" height="230" rx="24" fill="#fff"/><circle cx="115" cy="260" r="26" fill="#e57b2f"/><text x="115" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">1</text><text x="182" y="269" text-anchor="middle" font-size="23" font-weight="700" fill="#263653">업무</text><text x="182" y="320" text-anchor="middle" font-size="17" fill="#687286">초안 · 검색 · 분류</text><text x="182" y="350" text-anchor="middle" font-size="17" fill="#687286">보조 또는 자동화</text><text x="182" y="400" text-anchor="middle" font-size="16" fill="#a15b27">오류 비용에 따라 다름</text>
    <rect x="345" y="210" width="235" height="230" rx="24" fill="#fff"/><circle cx="395" cy="260" r="26" fill="#d7a322"/><text x="395" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">2</text><text x="462" y="269" text-anchor="middle" font-size="23" font-weight="700" fill="#263653">직무</text><text x="462" y="320" text-anchor="middle" font-size="17" fill="#687286">사람의 판단 이동</text><text x="462" y="350" text-anchor="middle" font-size="17" fill="#687286">새 책임과 검토</text><text x="462" y="400" text-anchor="middle" font-size="16" fill="#8d6b13">경력 사다리 재설계</text>
    <rect x="625" y="210" width="235" height="230" rx="24" fill="#fff"/><circle cx="675" cy="260" r="26" fill="#3a8c75"/><text x="675" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">3</text><text x="742" y="269" text-anchor="middle" font-size="23" font-weight="700" fill="#263653">조직</text><text x="742" y="320" text-anchor="middle" font-size="17" fill="#687286">채용 · 교육 · 배치</text><text x="742" y="350" text-anchor="middle" font-size="17" fill="#687286">성과 배분 결정</text><text x="742" y="400" text-anchor="middle" font-size="16" fill="#2b6f5d">기업 선택이 결과 좌우</text>
    <rect x="905" y="210" width="235" height="230" rx="24" fill="#fff"/><circle cx="955" cy="260" r="26" fill="#4074be"/><text x="955" y="268" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">4</text><text x="1022" y="269" text-anchor="middle" font-size="23" font-weight="700" fill="#263653">노동시장</text><text x="1022" y="320" text-anchor="middle" font-size="17" fill="#687286">고용 · 임금 · 시간</text><text x="1022" y="350" text-anchor="middle" font-size="17" fill="#687286">업종별 충격 분화</text><text x="1022" y="400" text-anchor="middle" font-size="16" fill="#315f9f">정책과 안전망 개입</text>
  </g>
  <g stroke="#8790a0" stroke-width="5" fill="none"><path d="M300 325 H345"/><path d="M580 325 H625"/><path d="M860 325 H905"/></g><g fill="#8790a0"><path d="M335 312 l20 13 -20 13z"/><path d="M615 312 l20 13 -20 13z"/><path d="M895 312 l20 13 -20 13z"/></g>
  <rect x="250" y="500" width="700" height="62" rx="18" fill="#263653"/><text x="600" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#fff">핵심: 모델 성능이 아니라 전환 속도와 제도 설계가 고용 결과를 결정</text>
</svg>
