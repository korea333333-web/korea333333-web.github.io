      <text x="72" y="358">92.2 vs 84.4</text>
      <text x="72" y="430">91.9 vs 85.6</text>
      <text x="72" y="502">52.7 vs 46.9</text>
      <text x="72" y="574">80.0 vs 76.4</text>
