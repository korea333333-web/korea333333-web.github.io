<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GPT-5.6 Sol의 GPT-5.5 대비 주요 평가 점수 상승폭</title>
  <desc id="desc">ExploitBench 25.6점, OSWorld 2.0 15.1점, BrowseComp Ultra 7.8점, Terminal-Bench 2.1 Ultra 6.3점, Agents' Last Exam 5.8점, Coding Agent Index 3.6점 상승을 보여주는 가로 막대그래프</desc>
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="72" y="66" fill="#16201c" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="34" font-weight="700">GPT-5.5에서 GPT-5.6으로, 어디가 크게 뛰었나</text>
  <text x="72" y="103" fill="#5d6a64" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="19">공식 공개 점수의 차이, 단위: 퍼센트포인트 또는 지수 점수</text>

  <g font-family="Segoe UI, Malgun Gothic, sans-serif">
