      <line x1="370" y1="142" x2="370" y2="590"/>
      <line x1="495" y1="142" x2="495" y2="590"/>
      <line x1="620" y1="142" x2="620" y2="590"/>
      <line x1="745" y1="142" x2="745" y2="590"/>
      <line x1="870" y1="142" x2="870" y2="590"/>
