  <text x="72" y="670" fill="#5d6a64" font-family="Segoe UI, Malgun Gothic, sans-serif" font-size="16">출처: OpenAI GPT-5.6 공식 발표 표. Ultra는 기본 4-agent 구성. 전체 평가가 아닌 대표 업무 항목만 표시.</text>
