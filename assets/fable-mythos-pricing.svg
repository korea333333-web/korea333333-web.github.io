<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Claude Fable 5 and Mythos 5 pricing infographic</title>
  <desc id="desc">An infographic-card style comparison showing input cost of 10 dollars and output cost of 50 dollars per one million tokens, highlighting that output is 5x input.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.58" stop-color="#eef6f2"/>
      <stop offset="1" stop-color="#f7f2e8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1e342c" flood-opacity="0.16"/>
    </filter>
    <style>
      .t{font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif}
      .title{font-size:44px;font-weight:850;fill:#16201c}
      .sub{font-size:22px;fill:#5d6a64}
      .label{font-size:21px;font-weight:800;fill:#16201c}
      .small{font-size:17px;fill:#5d6a64}
      .money{font-size:74px;font-weight:900}
      .chip{font-size:16px;font-weight:800;letter-spacing:0;fill:#2457d6}
      .infographic-card{fill:#fff;stroke:#dce6e1;stroke-width:1.5}
    </style>
  </defs>

  <rect width="1080" height="720" rx="36" fill="url(#bg)"/>
  <g class="t">
    <text x="64" y="82" class="chip">ANTHROPIC PRICING SNAPSHOT</text>
    <text x="64" y="138" class="title">Fable 5 / Mythos 5 가격 구조</text>
    <text x="64" y="176" class="sub">공식 발표 기준, 100만 토큰당 API 가격</text>

    <g filter="url(#shadow)">
      <rect x="64" y="232" width="420" height="260" rx="24" class="infographic-card"/>
      <text x="104" y="286" class="label">Input</text>
      <text x="104" y="374" class="money" fill="#2457d6">$10</text>
      <text x="104" y="414" class="small">per 1M tokens</text>
      <rect x="104" y="446" width="300" height="18" rx="9" fill="#e8f1ff"/>
      <rect x="104" y="446" width="60" height="18" rx="9" fill="#2457d6"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="596" y="232" width="420" height="260" rx="24" class="infographic-card"/>
      <text x="636" y="286" class="label">Output</text>
      <text x="636" y="374" class="money" fill="#18a875">$50</text>
      <text x="636" y="414" class="small">per 1M tokens</text>
      <rect x="636" y="446" width="300" height="18" rx="9" fill="#dff3eb"/>
      <rect x="636" y="446" width="300" height="18" rx="9" fill="#18a875"/>
    </g>

    <g>
      <rect x="394" y="548" width="292" height="84" rx="22" fill="#16201c"/>
      <text x="540" y="586" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">핵심 차이</text>
      <text x="540" y="622" text-anchor="middle" font-size="34" font-weight="900" fill="#ffffff">Output is 5x</text>
    </g>

    <path d="M500 358 C540 326 558 326 594 358" fill="none" stroke="#d9951e" stroke-width="6" stroke-linecap="round"/>
    <path d="M582 340 L596 358 L574 360" fill="none" stroke="#d9951e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="64" y="674" class="small">Source: Anthropic, Claude Fable 5 and Claude Mythos 5, Jun 9 2026</text>
  </g>
</svg>
